<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Premium Portfolio</title>

<style>
:root{
  --bg:#0f0f0f;
  --text:#ffffff;
  --muted:#a0a0a0;
  --card:#1a1a1a;
  --accent:#6c63ff;
}

body.light{
  --bg:#ffffff;
  --text:#111;
  --card:#f2f2f2;
  --muted:#555;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:10;
}

.logo{font-weight:700;}

nav{
  display:flex;
  gap:15px;
}

nav a{
  color:var(--text);
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:14px;
}

nav svg{
  width:18px;height:18px;
}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px;
}

.hero h1{
  font-size:44px;
  margin:0;
}

.hero p{
  color:var(--muted);
}

.hero-buttons{
  margin-top:20px;
}

button{
  padding:10px 18px;
  margin:5px;
  border:none;
  cursor:pointer;
  border-radius:8px;
}

.primary{
  background:var(--accent);
  color:white;
}

.secondary{
  background:transparent;
  border:1px solid var(--text);
  color:var(--text);
}

/* SOCIAL */
.socials{
  margin-top:25px;
}

.socials a{
  margin:0 8px;
  color:var(--text);
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

.section p{
  color:var(--muted);
}

/* PROJECTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

/* ICON */
svg{
  width:20px;
  height:20px;
  fill:none;
  stroke:currentColor;
}

/* MOBILE */
#menuBtn{display:none;background:none;color:var(--text);}

@media(max-width:768px){
  nav{
    display:none;
    position:absolute;
    top:60px;
    right:20px;
    flex-direction:column;
    background:var(--card);
    padding:10px;
    border-radius:10px;
  }

  nav.show{display:flex;}
  #menuBtn{display:block;}
}
</style>
</head>

<body>

<!-- ================= SVG ICON SYSTEM ================= -->
<svg style="display:none">

<!-- HOME -->
<symbol id="home" viewBox="0 0 24 24">
<path d="M3 10.5L12 3L21 10.5V20A1 1 0 0 1 20 21H4A1 1 0 0 1 3 20V10.5Z" stroke-width="1.75"/>
<path d="M9 21V12H15V21" stroke-width="1.75"/>
</symbol>

<!-- ABOUT -->
<symbol id="about" viewBox="0 0 24 24">
<circle cx="12" cy="7" r="4" stroke-width="1.75"/>
<path d="M5 21C5 17.134 8.134 14 12 14C15.866 14 19 17.134 19 21" stroke-width="1.75"/>
</symbol>

<!-- PROJECTS -->
<symbol id="projects" viewBox="0 0 24 24">
<rect x="3" y="4" width="18" height="14" rx="2" stroke-width="1.75"/>
<path d="M8 21H16" stroke-width="1.75"/>
</symbol>

<!-- MENU -->
<symbol id="menu" viewBox="0 0 24 24">
<path d="M4 7H20M4 12H20M4 17H20" stroke-width="1.75"/>
</symbol>

<!-- CLOSE -->
<symbol id="close" viewBox="0 0 24 24">
<path d="M6 6L18 18M18 6L6 18" stroke-width="1.75"/>
</symbol>

<!-- GITHUB -->
<symbol id="github" viewBox="0 0 24 24">
<path d="M9 19C4 20.5 4 16.5 2 16M22 16V21M22 16C22 14 21 13 20 13H16V10C16 9 15 8 14 8H10C9 8 8 9 8 10V13H4C3 13 2 14 2 16V21" stroke-width="1.75"/>
</symbol>

<!-- LINKEDIN -->
<symbol id="linkedin" viewBox="0 0 24 24">
<rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.75"/>
</symbol>

</svg>

<!-- ================= HEADER ================= -->
<header>
  <div class="logo">Portfolio</div>

  <nav id="nav">
    <a href="#"><svg><use href="#home"/></svg>Home</a>
    <a href="#"><svg><use href="#about"/></svg>About</a>
    <a href="#"><svg><use href="#projects"/></svg>Projects</a>
  </nav>

  <div>
    <button id="themeToggle">🌙</button>
    <button id="menuBtn"><svg><use href="#menu"/></svg></button>
  </div>
</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>Hi, I'm a Developer</h1>
  <p>I build modern web experiences</p>

  <div class="hero-buttons">
    <button class="primary">View Projects</button>
    <button class="secondary">Contact Me</button>
  </div>

  <div class="socials">
    <a href="#"><svg><use href="#github"/></svg></a>
    <a href="#"><svg><use href="#linkedin"/></svg></a>
  </div>
</section>

<!-- ================= ABOUT ================= -->
<section class="section">
  <h2>About Me</h2>
  <p>I am a full-stack developer passionate about clean UI and performance.</p>
</section>

<!-- ================= PROJECTS ================= -->
<section class="section">
  <h2>Projects</h2>

  <div class="grid">
    <div class="card">
      <h3>Project One</h3>
      <p>Modern UI dashboard</p>
    </div>

    <div class="card">
      <h3>Project Two</h3>
      <p>E-commerce platform</p>
    </div>

    <div class="card">
      <h3>Project Three</h3>
      <p>Portfolio system</p>
    </div>
  </div>
</section>

<!-- ================= JS ================= -->
<script>
const themeBtn = document.getElementById("themeToggle");
themeBtn.onclick = () => {
  document.body.classList.toggle("light");
  themeBtn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
};

const menuBtn = document.getElementById("menuBtn");
const nav = document.getElementById("nav");

menuBtn.onclick = () => {
  nav.classList.toggle("show");
};
</script>

</body>
</html>
